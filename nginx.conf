# Redirect HTTP → HTTPS (non-www)
server {
    listen 80;
    server_name nuerova.xyz www.nuerova.xyz;
    return 301 https://nuerova.xyz$request_uri;
}

# Redirect HTTPS www → HTTPS non-www
server {
    listen 443 ssl;
    server_name www.nuerova.xyz;

    ssl_certificate     /etc/letsencrypt/live/nuerova.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nuerova.xyz/privkey.pem;

    return 301 https://nuerova.xyz$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name nuerova.xyz;

    ssl_certificate     /etc/letsencrypt/live/nuerova.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nuerova.xyz/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/nuerova/dist;
    index index.html;

    # Serve pre-rendered static HTML for known routes; fall back to SPA index
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Do not cache HTML so fresh meta tags are always served
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
